name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-scope:
    name: Detect release-only bump
    runs-on: ubuntu-latest
    outputs:
      release_only: ${{ steps.classify.outputs.release_only }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          release_only=false
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [[ ! "$before" =~ ^0+$ ]]; then
              mapfile -t files < <(git diff --name-only "$before" "$after" | sort)
              if [[ ${#files[@]} -eq 1 && "${files[0]}" == "pyproject.toml" ]] && git diff -U0 "$before" "$after" -- pyproject.toml | awk '
                /^diff --git / || /^index / || /^--- / || /^\+\+\+ / || /^@@ / { next }
                /^[+-]/ {
                  if ($0 ~ /^[+-]version = "[^"]+"[[:space:]]*$/) next
                  bad=1
                }
                END { exit bad }
              '; then
                release_only=true
              fi
            fi
          fi

          echo "release_only=$release_only" >> "$GITHUB_OUTPUT"

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: release-scope
    if: needs.release-scope.outputs.release_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Run mypy
        run: mypy src/solem_blip_ble

  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    needs: [release-scope, test]
    if: needs.release-scope.outputs.release_only != 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  attest-build:
    name: Attest built distributions
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/

      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*

  release-sanity:
    name: Release bump sanity
    runs-on: ubuntu-latest
    needs: release-scope
    if: needs.release-scope.outputs.release_only == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build distributions
        run: python -m pip install --upgrade pip build && python -m build

      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*
